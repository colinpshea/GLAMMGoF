<svg width="680" viewBox="0 0 680 600" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Decision tree for Jensen's inequality bias correction in GLMM marginal predictions</title>
<desc>A flowchart with three yes/no questions guiding users to decide whether to apply a lognormal bias correction to their GLMM marginal predictions.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Start node -->
<rect x="240" y="20" width="200" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A" x="340" y="42" text-anchor="middle" dominant-baseline="central">Fit a GLMM with log link</text>

<!-- Arrow down -->
<line x1="340" y1="64" x2="340" y2="100" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Q1 box -->
<rect x="150" y="100" width="380" height="60" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53" x="340" y="122" text-anchor="middle" dominant-baseline="central">Are predictions used for</text>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53" x="340" y="146" text-anchor="middle" dominant-baseline="central">absolute magnitudes?</text>

<!-- No left -->
<line x1="150" y1="130" x2="80" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="112" y="122" text-anchor="middle">No</text>

<!-- No outcome 1 -->
<rect x="14" y="155" width="120" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#04342C" x="74" y="175" text-anchor="middle" dominant-baseline="central">Correction</text>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#04342C" x="74" y="195" text-anchor="middle" dominant-baseline="central">not needed</text>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="74" y="224" text-anchor="middle">Relative patterns and</text>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="74" y="238" text-anchor="middle">contrasts unaffected</text>

<!-- Yes down -->
<line x1="340" y1="160" x2="340" y2="210" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="352" y="190" text-anchor="start">Yes</text>

<!-- Q2 box -->
<rect x="130" y="210" width="420" height="60" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53" x="340" y="232" text-anchor="middle" dominant-baseline="central">Are the random effects substantive</text>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53" x="340" y="256" text-anchor="middle" dominant-baseline="central">(not nuisance parameters)?</text>

<!-- No left -->
<line x1="130" y1="240" x2="80" y2="240" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="80" y1="240" x2="80" y2="265" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="102" y="232" text-anchor="middle">No</text>

<!-- No outcome 2 -->
<rect x="14" y="265" width="120" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#04342C" x="74" y="285" text-anchor="middle" dominant-baseline="central">Correction</text>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#04342C" x="74" y="305" text-anchor="middle" dominant-baseline="central">not needed</text>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="74" y="334" text-anchor="middle">Year, observer REs</text>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="74" y="348" text-anchor="middle">don&#39;t generalize</text>

<!-- Yes down -->
<line x1="340" y1="270" x2="340" y2="320" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="352" y="300" text-anchor="start">Yes</text>

<!-- Q3 box -->
<rect x="150" y="320" width="380" height="60" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53" x="340" y="342" text-anchor="middle" dominant-baseline="central">Is RE variance large enough</text>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53" x="340" y="366" text-anchor="middle" dominant-baseline="central">to matter? (&#963; &#8273; 0.3)</text>

<!-- No right -->
<line x1="530" y1="350" x2="596" y2="350" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="561" y="342" text-anchor="middle">No</text>

<!-- Negligible -->
<rect x="598" y="322" width="68" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#04342C" x="632" y="342" text-anchor="middle" dominant-baseline="central">Bias</text>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#04342C" x="632" y="362" text-anchor="middle" dominant-baseline="central">negligible</text>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="632" y="390" text-anchor="middle">&lt; 5%</text>

<!-- Yes down -->
<line x1="340" y1="380" x2="340" y2="428" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="352" y="410" text-anchor="start">Yes</text>

<!-- Apply correction -->
<rect x="140" y="430" width="400" height="60" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#4A1B0C" x="340" y="452" text-anchor="middle" dominant-baseline="central">Apply lognormal correction</text>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#4A1B0C" x="340" y="476" text-anchor="middle" dominant-baseline="central">exp(&#931;&#963;&#178; / 2) &#215; marginal prediction</text>

<!-- Two branches -->
<line x1="260" y1="490" x2="170" y2="530" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="420" y1="490" x2="510" y2="530" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Manual -->
<rect x="76" y="530" width="190" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#26215C" x="171" y="552" text-anchor="middle" dominant-baseline="central">bias_adjust = "manual"</text>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="171" y="586" text-anchor="middle">random intercepts</text>

<!-- TMB -->
<rect x="416" y="530" width="190" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#26215C" x="511" y="552" text-anchor="middle" dominant-baseline="central">bias_adjust = "tmb"</text>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="511" y="586" text-anchor="middle">random slopes / complex RE</text>

</svg>
