<svg width="680" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Decision tree for Jensen's inequality bias correction in GLMM marginal predictions</title>
<desc>A flowchart with three yes/no questions guiding users to decide whether to apply a lognormal bias correction to their GLMM marginal predictions.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Start node — centred -->
<rect x="215" y="20" width="250" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#2C2C2A" x="340" y="42" text-anchor="middle" dominant-baseline="central">Fit a GLMM with log link</text>

<!-- Arrow down -->
<line x1="340" y1="64" x2="340" y2="100" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Q1 -->
<rect x="170" y="100" width="340" height="60" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53" x="340" y="122" text-anchor="middle" dominant-baseline="central">Are predictions used for</text>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53" x="340" y="146" text-anchor="middle" dominant-baseline="central">absolute magnitudes?</text>

<!-- Q1 No — L-bend right side to avoid overlap -->
<line x1="510" y1="130" x2="570" y2="130" stroke="#888780" stroke-width="1.5"/>
<line x1="570" y1="130" x2="570" y2="172" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="538" y="122" text-anchor="middle">No</text>

<!-- No outcome 1 — right side -->
<rect x="510" y="174" width="150" height="50" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#04342C" x="585" y="192" text-anchor="middle" dominant-baseline="central">Correction</text>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#04342C" x="585" y="210" text-anchor="middle" dominant-baseline="central">not needed</text>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="585" y="236" text-anchor="middle">Relative patterns,</text>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="585" y="250" text-anchor="middle">contrasts unaffected</text>

<!-- Q1 Yes down -->
<line x1="340" y1="160" x2="340" y2="210" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="352" y="190" text-anchor="start">Yes</text>

<!-- Q2 -->
<rect x="150" y="210" width="380" height="60" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53" x="340" y="232" text-anchor="middle" dominant-baseline="central">Are the random effects substantive</text>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53" x="340" y="256" text-anchor="middle" dominant-baseline="central">(not nuisance parameters)?</text>

<!-- Q2 No — right side -->
<line x1="530" y1="240" x2="570" y2="240" stroke="#888780" stroke-width="1.5"/>
<line x1="570" y1="240" x2="570" y2="282" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="548" y="232" text-anchor="middle">No</text>

<!-- No outcome 2 — right side -->
<rect x="510" y="284" width="150" height="50" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#04342C" x="585" y="302" text-anchor="middle" dominant-baseline="central">Correction</text>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#04342C" x="585" y="320" text-anchor="middle" dominant-baseline="central">not needed</text>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="585" y="346" text-anchor="middle">Year, observer REs</text>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="585" y="360" text-anchor="middle">don&#39;t generalize</text>

<!-- Q2 Yes down -->
<line x1="340" y1="270" x2="340" y2="320" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="352" y="300" text-anchor="start">Yes</text>

<!-- Q3 -->
<rect x="160" y="320" width="360" height="60" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53" x="340" y="342" text-anchor="middle" dominant-baseline="central">Is RE variance large enough</text>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53" x="340" y="366" text-anchor="middle" dominant-baseline="central">to matter? (&#963; &#8273; 0.3)</text>

<!-- Q3 No — right, above the other No boxes -->
<line x1="520" y1="350" x2="570" y2="350" stroke="#888780" stroke-width="1.5"/>
<line x1="570" y1="350" x2="570" y2="392" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="543" y="342" text-anchor="middle">No</text>

<!-- Negligible outcome -->
<rect x="510" y="394" width="150" height="50" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#04342C" x="585" y="412" text-anchor="middle" dominant-baseline="central">Bias</text>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#04342C" x="585" y="430" text-anchor="middle" dominant-baseline="central">negligible (&lt;5%)</text>

<!-- Q3 Yes down -->
<line x1="340" y1="380" x2="340" y2="430" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-family="sans-serif" font-size="12" fill="#5F5E5A" x="352" y="410" text-anchor="start">Yes</text>

<!-- Apply correction box -->
<rect x="120" y="430" width="400" height="60" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#4A1B0C" x="320" y="452" text-anchor="middle" dominant-baseline="central">Apply lognormal correction</text>
<text font-family="sans-serif" font-size="13" font-weight="500" fill="#4A1B0C" x="320" y="476" text-anchor="middle" dominant-baseline="central">exp(&#931;&#963;&#178; / 2) &#215; marginal prediction</text>

<!-- Two branches to correction options -->
<line x1="230" y1="490" x2="160" y2="530" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="390" y1="490" x2="460" y2="530" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Manual -->
<rect x="60" y="530" width="200" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#26215C" x="160" y="552" text-anchor="middle" dominant-baseline="central">bias_adjust = "manual"</text>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="160" y="588" text-anchor="middle">random intercepts</text>

<!-- TMB -->
<rect x="370" y="530" width="200" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text font-family="sans-serif" font-size="12" font-weight="500" fill="#26215C" x="470" y="552" text-anchor="middle" dominant-baseline="central">bias_adjust = "tmb"</text>
<text font-family="sans-serif" font-size="11" fill="#5F5E5A" x="470" y="588" text-anchor="middle">random slopes / complex RE</text>

</svg>
